<aside class="sidebar" [class.collapsed]="isCollapsed">
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <div class="logo-text" *ngIf="!isCollapsed">
      <div class="logo-title">CANTRACE</div>
      <div class="logo-subtitle">Environmental Ops</div>
    </div>
  </div>

  <nav class="nav">
    <a *ngFor="let item of visibleNavItems"
       [routerLink]="item.route"
       routerLinkActive="active"
       class="nav-item">
      <span class="nav-icon">{{ item.icon }}</span>
      <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>
      <span class="nav-badge" *ngIf="item.badge && item.badge > 0 && !isCollapsed">{{ item.badge }}</span>
    </a>
  </nav>

  <div class="user-profile" *ngIf="!isCollapsed">
    <div class="user-avatar">{{ user?.username?.charAt(0)?.toUpperCase() || 'U' }}</div>
    <div class="user-info">
      <div class="user-name">{{ user?.username || 'Usuário' }}</div>
      <div class="user-email">{{ user?.role || 'N/A' }}</div>
    </div>
    <button class="logout-btn" (click)="logout()" title="Sair">
      🚪
    </button>
  </div>
</aside>

services:
  postgres:
    image: postgres:16-alpine
    container_name: cantrace-postgres
    environment:
      POSTGRES_DB: cantrace
      POSTGRES_USER: cantrace
      POSTGRES_PASSWORD: cantrace
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cantrace -d cantrace"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cantrace-postgres-data:/var/lib/postgresql/data

volumes:
  cantrace-postgres-data:

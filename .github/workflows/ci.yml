name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cantrace
          POSTGRES_PASSWORD: cantrace
          POSTGRES_DB: cantrace
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Configure application properties
        run: |
          cat > backend/src/main/resources/application.properties << 'EOF'
          spring.datasource.url=jdbc:postgresql://localhost:5432/cantrace
          spring.datasource.username=cantrace
          spring.datasource.password=cantrace
          spring.jpa.hibernate.ddl-auto=validate
          spring.jpa.open-in-view=false
          spring.flyway.enabled=true
          EOF

      - name: Run tests
        working-directory: backend
        run: mvn test -B

      - name: Generate test report
        if: always()
        working-directory: backend
        run: mvn surefire-report:report -B
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/
          retention-days: 7

spring.application.name=cantrace-backend
server.port=${SERVER_PORT:8080}

# DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cantrace}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cantrace}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cantrace}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

<header class="topbar">
  <div class="left">
    <h1 class="title">{{ title }}</h1>
    <span class="last-update">Última atualização: {{ lastUpdate | date:'HH:mm:ss' }}</span>
  </div>
  
  <div class="right">
    <div class="mqtt-status" [class.connected]="mqttStatus === 'connected'" [class.reconnecting]="mqttStatus === 'reconnecting'">
      <span class="status-dot"></span>
      <span>{{ mqttStatus === 'connected' ? 'MQTT Conectado' : mqttStatus === 'reconnecting' ? 'Reconectando...' : 'MQTT Desconectado' }}</span>
    </div>
    
    <button class="refresh-btn" (click)="onRefresh()" aria-label="Atualizar dados">
      🔄 Atualizar
    </button>
  </div>
</header>
